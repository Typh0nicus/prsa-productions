const byId = (id) => document.getElementById(id);
const roleLabel = (work) => work.role || 'Editor';
const projectHref = (work) => 'case-study.html?id=' + encodeURIComponent(work.id);
const PORTRAIT_VIDEO_IDS = new Set(['gar4U3n-ILY', 'yy-Nt0dRhNI', 'Q1g8PYEFcHc', 'KaUuPNYHFNg', 'vQz3T9Vot1Q', '9DPzZIbp9Ck']);

let works = FALLBACK_WORKS;

function selectWork() {
  const params = new URLSearchParams(location.search);
  const requested = params.get('id') || location.hash.replace('#', '');
  return works.find((work) => work.id === requested) || works[0];
}

function renderCase() {
  const work = selectWork();
  const index = works.findIndex((item) => item.id === work.id);
  const next = works[(index + 1) % works.length];
  const portrait = work.format === 'portrait' || PORTRAIT_VIDEO_IDS.has(work.id);
  const thumb = portrait ? `https://i.ytimg.com/vi/${work.id}/oar2.jpg` : (work.thumb || `https://i.ytimg.com/vi/${work.id}/maxresdefault.jpg`);

  document.title = work.title + ' — Prša Productions';
  byId('csTitle').textContent = work.title;
  byId('csMeta').textContent = [roleLabel(work), 'YouTube'].join(' / ');
  byId('videoShell').classList.toggle('is-portrait', portrait);
  byId('videoShell').innerHTML = `<a class="video-poster" href="${work.url}" target="_blank" rel="noopener"><img src="${thumb}" alt="${work.title}" loading="eager" onerror="this.onerror=null;this.src='${work.thumbFallback || `https://i.ytimg.com/vi/${work.id}/hqdefault.jpg`}'"><span>Watch on YouTube</span></a>`;
  byId('watchLink').href = work.url;
  byId('nextProject').href = projectHref(next);
  byId('nextTitle').textContent = next.title;
}

async function hydrateWorks() {
  try {
    const response = await fetch('works.json', { cache: 'no-store' });
    if (response.ok) {
      const data = await response.json();
      if (Array.isArray(data.featured) && data.featured.length) {
        works = data.featured;
      }
    }
  } catch (error) {
    works = FALLBACK_WORKS;
  }
  renderCase();
}

function initChrome() {
  const nav = byId('nav');
  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > 16);
  }, { passive: true });

  byId('yr').textContent = new Date().getFullYear();
  document.addEventListener('copy', (event) => event.preventDefault());
  document.addEventListener('dragstart', (event) => event.preventDefault());
}

initChrome();
hydrateWorks();
</script>
